<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Little web implementation of a chess pretty small chess engine that uses ONNX.js to make predictions"
    />
    <title>Chessy - Neural Chess Engine</title>

    <script src="https://unpkg.com/lodash@4.17.20"></script>

    <link rel="stylesheet" href="./assets/chessboard.css" />
    <link rel="stylesheet" href="./assets/extensions/markers/markers.css" />
    <link
      rel="stylesheet"
      href="./assets/extensions/promotion-dialog/promotion-dialog.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/onnxjs/dist/onnx.min.js"></script>

    <script>
      (function() {
        if (window.onnx && onnx.InferenceSession && onnx.InferenceSession.prototype.loadModel) {
          const originalLoadModel = onnx.InferenceSession.prototype.loadModel;
          onnx.InferenceSession.prototype.loadModel = function(path) {
            try {
              if (typeof path === 'string' && path.startsWith('../models/')) {
                path = './models/' + path.slice('../models/'.length);
              }
            } catch (_) {}
            return originalLoadModel.call(this, path);
          };
        }
      })();
    </script>

    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1 class="app-title">
          <span class="title-main">Chessy</span>
          <span class="title-badge">GM</span>
        </h1>
      </header>

      <main class="game-area">
        <section class="player-card player-card--top" id="aiPlayerCard">
          <div class="player-avatar">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="8" r="4" fill="currentColor"/>
              <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="currentColor"/>
            </svg>
          </div>
          <div class="player-info">
            <h2 class="player-name">Neural Engine</h2>
            <span class="player-rating">Rating: 4000</span>
          </div>
          <div class="turn-indicator" id="aiTurnIndicator"></div>
        </section>

        <div class="board-container">
          <div id="board" class="board dark-slate"></div>
          <div id="modelLoading" class="model-loading hidden">
            <div class="loading-spinner"></div>
            <span>Loading model...</span>
          </div>
        </div>

        <section class="player-card player-card--bottom" id="humanPlayerCard">
          <div class="player-avatar">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="8" r="4" fill="currentColor"/>
              <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="currentColor"/>
            </svg>
          </div>
          <div class="player-info">
            <h2 class="player-name">You</h2>
            <span class="player-rating">Human</span>
          </div>
          <div class="turn-indicator active" id="humanTurnIndicator"></div>
        </section>
      </main>

      <section class="controls">
        <button id="flipBoardButton" class="control-button">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Flip Board</span>
        </button>
        <button id="autoPlayButton" class="control-button">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" fill="currentColor"/>
            <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>Auto Play</span>
        </button>
      </section>
    </div>

    <overlay id="overlay" class="overlay hidden">
      <div class="overlay-content">
        <h2 id="gameOverText">Game Over</h2>
        <button id="restartButton" class="primary-button">Restart Game</button>
      </div>
    </overlay>

    <script src="main.js"></script>
  </body>
</html>
